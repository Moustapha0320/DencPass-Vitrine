<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Denc — Gérez, chiffrez et protégez vos mots de passe et secrets numériques." />
    <title>Denc — Sécurisez · Stockez · Protégez</title>
    <link rel="icon" type="image/png" href="/denc-logo.png" />
    <link rel="apple-touch-icon" href="/denc-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      @keyframes cipher-fade {
        0%, 100% { opacity: 0; }
        50% { opacity: 0.06; }
      }
      @keyframes float-in {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes glow-pulse {
        0%, 100% { box-shadow: 0 0 30px rgba(47,217,244,0.15); }
        50%       { box-shadow: 0 0 60px rgba(47,217,244,0.3); }
      }
      @keyframes scan-line {
        0%   { transform: translateY(-100%); }
        100% { transform: translateY(100vh); }
      }
      .hero-word {
        display: inline-block;
        animation: float-in 0.7s cubic-bezier(0.16,1,0.3,1) both;
      }
      .hero-word:nth-child(1) { animation-delay: 0.1s; }
      .hero-word:nth-child(2) { animation-delay: 0.2s; }
      .hero-word:nth-child(3) { animation-delay: 0.3s; }
      .feature-card {
        transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      }
      .feature-card:hover {
        transform: translateY(-4px);
        border-color: rgba(47,217,244,0.35) !important;
        box-shadow: 0 8px 40px rgba(47,217,244,0.1);
      }
      .btn-primary {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(47,217,244,0.35);
      }
      .btn-ghost {
        transition: border-color 0.2s ease, color 0.2s ease;
      }
      .btn-ghost:hover {
        border-color: rgba(47,217,244,0.6) !important;
        color: var(--accent) !important;
      }
      .nav-link {
        transition: color 0.2s ease;
        position: relative;
      }
      .nav-link::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 1px;
        background: var(--accent);
        transition: width 0.2s ease;
      }
      .nav-link:hover { color: var(--text) !important; }
      .nav-link:hover::after { width: 100%; }
      .edition-card {
        transition: transform 0.25s ease, box-shadow 0.25s ease;
      }
      .edition-card:hover {
        transform: translateY(-6px);
      }
      @media (max-width: 768px) {
        .grid-2 { grid-template-columns: 1fr !important; }
        .grid-3 { grid-template-columns: 1fr !important; }
        .nav-links { display: none !important; }
        .hero-h1 { font-size: 2.75rem !important; }
        .section-pad { padding: 4rem 1.5rem !important; }
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation: none !important; transition: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
